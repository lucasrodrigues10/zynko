app = "zynko"
primary_region = "gru"

[build]

[env]
  ASPNETCORE_ENVIRONMENT = "Production"
  ConnectionStrings__ZynkoDb = "DataSource=/data/Zynko.db;Cache=Shared"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = "zynko_data"
  destination = "/data"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
